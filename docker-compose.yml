version: '3.8'

services:
  postgres:
    container_name: postgres_db
    image: postgres:17-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    volumes:
      - ./backend/data:/var/lib/postgresql/data